<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller Cartográfico</title>

    <style>
        /* CSS Reset and Variables */
        :root {
            --primary-dark: #121418;
            --primary-light: #f5f4f0;
            --text-light: #ffffff;
            --text-dark: #1a1a1a;
            --accent: #4a6fa5;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            color: var(--text-dark);
            background-color: var(--primary-light);
            scroll-behavior: smooth;
        }

        a { text-decoration: none; color: inherit; }
        
        /* Header Navigation */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            box-sizing: border-box;
            z-index: 100;
            color: var(--text-light);
        }
        
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
            padding: 0;
        }
        
        nav a {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }
        
        nav a:hover { opacity: 0.7; }
        
        /* Hero Section (Visit Husavik style) */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(18, 20, 24, 0.4), rgba(18, 20, 24, 0.7)), url('https://images.unsplash.com/photo-1524661135-423995f22d0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            text-align: center;
            position: relative;
        }
        
        .hero h1 {
            font-size: 5vw;
            margin: 0 0 20px 0;
            font-weight: 500;
            letter-spacing: -1px;
        }
        
        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            font-weight: 300;
        }
        
        /* Dark Theme Grid Section */
        .grid-section {
            padding: 100px 60px;
            background-color: var(--primary-dark);
            color: var(--text-light);
        }
        
        .section-header {
            margin-bottom: 50px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        .section-header h2 {
            font-size: 3rem;
            margin: 0;
            font-weight: 400;
            letter-spacing: -1px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .card {
            position: relative;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #222;
            cursor: pointer;
        }
        
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }
        
        .card:hover img {
            transform: scale(1.05);
        }
        
        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            box-sizing: border-box;
        }
        
        .card h3 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 500;
        }
        
        /* Light Map/Feature Section */
        .feature-split {
            display: flex;
            background-color: var(--primary-light);
            padding: 120px 60px;
            gap: 80px;
            align-items: center;
        }
        
        .feature-text {
            flex: 1;
            padding-right: 40px;
        }
        
        .feature-text h2 {
            font-size: 3rem;
            margin-top: 0;
            margin-bottom: 30px;
            color: var(--primary-dark);
            font-weight: 500;
            letter-spacing: -1px;
        }
        
        .feature-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #444;
            margin-bottom: 20px;
        }
        
        .feature-image {
            flex: 1.2;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }
        
        .feature-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Footer */
        footer {
            background-color: var(--primary-dark);
            color: var(--text-light);
            padding: 60px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            header { padding: 20px 30px; flex-direction: column; gap: 20px; background: rgba(18,20,24,0.9); }
            .hero h1 { font-size: 3rem; }
            .feature-split { flex-direction: column; padding: 60px 30px; gap: 40px; }
            .feature-text { padding-right: 0; }
            .grid-section { padding: 60px 30px; }
            .section-header h2 { font-size: 2rem; }
        }
    </style>
</head>

    </body>
</html>
